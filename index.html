<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Formulario login y register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wave-container">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div> </div>

    <main> <section class="container-form register hide">
            <aside class="information"> <h2>Bienvenido</h2>
                <p>¿Ya tienes una cuenta? <strong>Inicia Sesión</strong> con tus datos</p>
                <button type="button" id="sign-in">Iniciar Sesión</button> </aside>

            <div class="form-information">
                <header>
                    <h2>Crear una Cuenta</h2>
                    <p>Usa tu email para registrarte</p>
                </header>

                <form class="form form-register">
                    <div class="form-group">
                        <label for="reg-user"><i class='bx bx-user'></i> Nombre Usuario</label>
                        <input type="text" id="reg-user" class=".form-control" placeholder="Ej. JuanPerez" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email"><i class='bx bx-envelope'></i> Correo Electrónico</label>
                        <input type="email" id="reg-email" name="userEmail" class=".form-control" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-pass"><i class='bx bx-lock-alt'></i> Contraseña</label>
                        <input type="password" id="reg-pass" name="userPassword" class=".form-control" placeholder="Tu contraseña" required>
                    </div>
                    
                    <button type="submit" id="btnEnviaR">Registrarse</button>
                </form>
            </div>
        </section>

        <section class="container-form login">
            <aside class="information">
                <h2>¡Bienvenido de vuelta!</h2>
                <p><strong>Inicia Sesión</strong> con tus datos</p>
                <p>o</p>
                <p><strong> Haz click </strong> para crear una <strong>cuenta nueva</strong></p>
                <button type="button" id="sign-up">Registrarse</button>
            </aside>

            <div class="form-information">
                <header>
                    <h2>Inicio de Sesión</h2>
                    <p>Ingresa tus datos</p>
                </header>

                <form class="form form-login " id="login-f">
                    <div class="form-group">
                        <label for="log-email"><i class='bx bx-envelope'></i> Correo Electrónico</label>
                        <input type="email" id="log-email" name="userEmail" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="log-pass"><i class='bx bx-lock-alt'></i> Contraseña</label>
                        <input type="password" id="log-pass" name="userPassword" placeholder="Tu contraseña" required>
                        <i class="bx bx-show-alt"></i>
                        
                    </div>
                    <button type="submit" id="btnEnviarL" disabled>Iniciar Sesión</button>
                </form>
                <p id="message-log"></p>
            </div>
        </section>

    </main>
    <script src="js/script.js"></script>
    <script src="js/register.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
